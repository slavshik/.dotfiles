os:
  editPreset: "nvim"
git:
  skipHookPrefixes: ["fixup!", "squash!"]
  branchLogCmd: "git log --color=always --pretty=format:\"%C(yellow)%h 📅 %C(green)%cd %C(reset)%s %C(cyan)%cE\" --date=short {{branchName}} --"
  commitPrefixes:
    js-clients: # This is repository folder name
      - pattern: "^([A-Z]+\\-[0-9]+).*"
        replace: '$1 '
    js-dealermodules: # This is repository folder name
      - pattern: "^([A-Z]+\\-[0-9]+).*"
        replace: '$1 '
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never
services:
  'gitlab.evolution.com': gitlab:gitlab.evolution.com
  'gitlab.evolutiongaming.com': gitlab:gitlab.evolution.com
  'gitlab.gosystem.io': gitlab:gitlab.gosystem.io
gui:
  nerdFontsVersion: "3"
  # Override .tsx icon: default lazygit uses U+ED46 which is missing in MesloLGL Nerd Font.
  # Using U+E7BA instead (same as lf config).
  customIcons:
    extensions:
      .py:
        icon: ""
        color: "#3572A5"
      .tsx:
        icon: ""
        color: "#04BCD4"
    filenames:
      package.json:
        icon: ""
        color: "#8BC34A"
  mainBranches: [master, main]
  theme:
    activeBorderColor:
      - '#ff9900'
      - bold
    inactiveBorderColor:
      - black
    showRandomTip: true
    showCommandLog: true
customCommands:
  - key: "<c-f>"
    context: "files,localBranches"
    command: "git push --force-with-lease"
    description: "Force push with lease"
    output: "terminal"
  - key: "<c-j>"
    context: "files,localBranches"
    description: "Generate commit message from AI"
    loadingText: "Committing..."
    prompts:
      - type: menuFromCommand
        title: "Pick an AI-suggested commit message"
        command: "sh -c '$HOME/.dotfiles/aicommit-suggest.sh'"
        filter: '^(?P<msg>\S.*)$'
        valueFormat: '{{ .msg }}'
        labelFormat: '{{ .msg }}'
      - type: input
        title: "Edit commit message"
        initialValue: "{{ index .PromptResponses 0 }}"
    command: "git commit -m {{ index .PromptResponses 1 | quote }}"
