# vim: ft=tmux

# ── Tabs on top ──────────────────────────────────────────────────────────────
set -g status-position top

# ── Catppuccin Mocha palette ─────────────────────────────────────────────────
# base      #1e1e2e    mantle    #181825    crust     #11111b
# surface0  #313244    surface1  #45475a    surface2  #585b70
# overlay0  #6c7086    overlay1  #7f849c    overlay2  #9399b2
# subtext0  #a6adc8    subtext1  #bac2de    text      #cdd6f4
# blue      #89b4fa    lavender  #b4befe    mauve     #cba6f7
# pink      #f5c2e7    red       #f38ba8    peach     #fab387
# yellow    #f9e2af    green     #a6e3a1    teal      #94e2d5

set -g mode-style "fg=#1e1e2e,bg=#f5c2e7,bold"
set -g message-style "fg=#cdd6f4,bg=#313244"
set -g message-command-style "fg=#cdd6f4,bg=#313244"

# ── Pane borders (shown only when >1 pane) ───────────────────────────────────
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g window-style "fg=default,bg=default"
set -g window-active-style "fg=default,bg=default"
set -g pane-border-status off
set -g pane-border-format ' #{?pane_active,#[fg=#89b4fa#,bold],#[fg=#6c7086]}#{pane_index} #{b:pane_current_path} '

set-hook -g window-layout-changed \
  'if-shell -F "#{>:#{window_panes},1}" "set -w pane-border-status top" "set -w pane-border-status off"'
set-hook -g session-window-changed \
  'if-shell -F "#{>:#{window_panes},1}" "set -w pane-border-status top" "set -w pane-border-status off"'
set-hook -g client-session-changed \
  'if-shell -F "#{>:#{window_panes},1}" "set -w pane-border-status top" "set -w pane-border-status off"'

# ── Status bar base ──────────────────────────────────────────────────────────
set -g status on
# Clear catppuccin's status-format override so our window formats win.
set -gu status-format
set -g status-bg default
set -g status-interval 5
set -g status-justify left
set -g status-style "fg=#cdd6f4,bg=default"
set -g status-left-length 200
set -g status-right-length 200
set -g status-left-style NONE
set -g status-right-style NONE

# ── Left: session badge ──────────────────────────────────────────────────────
set -g status-left "#[fg=#cba6f7,bg=default]#[fg=#1e1e2e,bg=#cba6f7,bold]   #S #[fg=#cba6f7,bg=default] "

# ── Right: layout · clock · host ─────────────────────────────────────────────
set -g status-right "#[fg=#45475a,bg=default]#[fg=#cdd6f4,bg=#45475a]  #{keyboard_layout} #[fg=#f9e2af,bg=#45475a]#[fg=#1e1e2e,bg=#f9e2af,bold]  %H:%M #[fg=#89b4fa,bg=#f9e2af]#[fg=#1e1e2e,bg=#89b4fa,bold]  #h #[fg=#89b4fa,bg=default]"

# ── Window rename: normalize versioned Claude binary name → "claude" ─────────
# Claude Code's binary is a symlink like ~/.local/share/claude/versions/2.1.116
# so pane_current_command shows the version string, not "claude".
set -g automatic-rename-format "#(echo '#{pane_current_command}' | sed -E 's/^[0-9]+\.[0-9]+\.[0-9]+$/claude/' | xargs -I{} ~/.tmux/plugins/tmux-nerd-font-window-name/bin/tmux-nerd-font-window-name {} #{window_panes})"

# ── Window tabs ──────────────────────────────────────────────────────────────
setw -g window-status-activity-style "fg=#fab387,bg=default,bold"
setw -g window-status-separator "  "
setw -g window-status-style "NONE,fg=#cdd6f4,bg=default"

# Format pieces:
#   #I                                               → window index
#   #W                                               → window name (icon from tmux-nerd-font-window-name)
#   #{s|^.*/([^/]+/[^/]+)$|\1|:pane_current_path}    → parent/folder (last 2 path components)
#
# Rounded caps: `` (E0B6) left · `` (E0B0) separator · `` (E0B4) right

# Inactive tab: surface0 number · surface1 body · rounded caps
setw -g window-status-format "#[fg=#313244,bg=default]#[fg=#a6adc8,bg=#313244] #I #[fg=#313244,bg=#45475a]#[fg=#cdd6f4,bg=#45475a] #W #[fg=#bac2de,bg=#45475a]#{s|^.*/([^/]+/[^/]+)$|\\1|:pane_current_path} #[fg=#45475a,bg=default]"

# Active tab: mauve number · lavender body · rounded caps
setw -g window-status-current-format "#[fg=#cba6f7,bg=default]#[fg=#1e1e2e,bg=#cba6f7,bold] #I #[fg=#cba6f7,bg=#b4befe]#[fg=#1e1e2e,bg=#b4befe,bold] #W #{s|^.*/([^/]+/[^/]+)$|\\1|:pane_current_path} #[fg=#b4befe,bg=default]"
