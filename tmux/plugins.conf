# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'imomaliev/tmux-keyboard-layout'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name' 
set -g @plugin 'christoomey/vim-tmux-navigator'

# Initialize TMUX plugin manager when installed (keep this at the very bottom of tmux.conf)
if-shell '[ -x ~/.tmux/plugins/tpm/tpm ]' \
  "run-shell ~/.tmux/plugins/tpm/tpm" \
  "display-message 'TPM not installed; skipping plugin bootstrap'"
