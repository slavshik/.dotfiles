set -g mouse on
# base-index 1
set -g base-index 1
setw -g pane-base-index 1
set -g extended-keys on # required for pi
set -g extended-keys-format csi-u # also pi

set -g focus-events on
set -g default-terminal "tmux-256color" # proper italics/undercurl inside tmux
set -as terminal-features ',alacritty*:RGB' # truecolor passthrough

bind r source-file ~/.tmux.conf \; if-shell -F '#{>:#{window_panes},1}' 'set -w pane-border-status top' 'set -w pane-border-status off' \; display "TMUX Reloaded!"

bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
set -g detach-on-destroy off  # don't exit from tmux when closing a session

bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"

# Navigate splits/panes seamlessly — triggered by CMD+hjkl (Alacritty sends prefix + arrow).
# In nvim (@pane-is-vim): forward Ctrl+hjkl so smart-splits moves the split (and crosses into
# tmux panes at the edge). Else (shell, lazygit, ...): select-pane. So CMD+hjkl always
# navigates, while plain Ctrl+hjkl stays free for apps (lazygit) and Ctrl+L clears the shell.
bind Left  if -F "#{@pane-is-vim}" 'send-keys C-h' 'select-pane -L'
bind Down  if -F "#{@pane-is-vim}" 'send-keys C-j' 'select-pane -D'
bind Up    if -F "#{@pane-is-vim}" 'send-keys C-k' 'select-pane -U'
bind Right if -F "#{@pane-is-vim}" 'send-keys C-l' 'select-pane -R'

# Resize: Alt+hjkl — passes through to any fullscreen TUI (nvim, lazygit...), resizes at a shell.
bind-key -n M-h if -F "#{alternate_on}" 'send-keys M-h' 'resize-pane -L 3'
bind-key -n M-j if -F "#{alternate_on}" 'send-keys M-j' 'resize-pane -D 3'
bind-key -n M-k if -F "#{alternate_on}" 'send-keys M-k' 'resize-pane -U 3'
bind-key -n M-l if -F "#{alternate_on}" 'send-keys M-l' 'resize-pane -R 3'

# Ctrl+L clears the shell (key forwarded to the focused pane). The explicit passthrough
# also overrides any stale "Ctrl+L -> select-pane" grab a running server kept, since
# source-file never unbinds keys you removed from the config — so prefix+r is enough.
bind-key -n C-l send-keys C-l

bind S command-prompt -p "New Session:" "new-session -A -s '%%'"
# close pane/window on CMD+W
bind W if-shell "$is_vim" 'send-keys Escape :q Enter' 'kill-pane'
# open pane/window in current path
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
# break pane into window
bind e break-pane
# resize panes (triggered via Alacritty CMD+Shift+H/J/K/L)
# NB: j/k are lowercase — capital K is the sesh menu, lowercase l is tmux's last-window
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r j resize-pane -D 2
bind -r k resize-pane -U 2

bind-key M split-window -h "v ~/.tmux.conf"

bind-key , swap-window -t -1 \; select-window -t -1    # Move left and follow
bind-key . swap-window -t +1 \; select-window -t +1    # Move right and follow
# Swap the active pane with its neighbour, following it — driven by CMD+Alt+hjkl (prefix + Shift+arrow)
bind-key S-Left  if-shell -F '#{pane_at_left}'   'display-message "No pane to the left"' 'swap-pane -s "{left-of}"'
bind-key S-Down  if-shell -F '#{pane_at_bottom}' 'display-message "No pane below"'        'swap-pane -s "{down-of}"'
bind-key S-Up    if-shell -F '#{pane_at_top}'    'display-message "No pane above"'         'swap-pane -s "{up-of}"'
bind-key S-Right if-shell -F '#{pane_at_right}'  'display-message "No pane to the right"'  'swap-pane -s "{right-of}"'

# SHOW SESSION MANAGER
bind-key "K" run-shell "sesh connect \"$(
	sesh list -c | fzf-tmux -p 55%,60% \
		--no-sort --border-label ' sesh ' --prompt '⚡  ' \
		--header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
		--bind 'tab:down,btab:up' \
		--bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list)' \
		--bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t)' \
		--bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c)' \
		--bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z)' \
		--bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
		--bind 'ctrl-d:execute(tmux kill-session -t {})+change-prompt(⚡  )+reload(sesh list)'
)\""

source ~/.dotfiles/tmux/plugins.conf
source ~/.dotfiles/tmux/statusline.conf
