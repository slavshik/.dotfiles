name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      # zsh/ and lf/ hold zsh-sourced files, daily-summary.sh is zsh —
      # shellcheck doesn't support zsh; those are covered by zsh -n below.
      - name: shellcheck bash/sh scripts
        run: |
          git ls-files '*.sh' \
            | grep -v '^zsh/' \
            | grep -v '^lf/' \
            | grep -v 'daily-summary.sh' \
            | xargs shellcheck --severity=warning -e SC1090,SC1091

  zsh-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install zsh
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zsh
      - name: zsh -n all zsh files
        run: |
          set -e
          for f in zsh/zshrc zsh/zshrc.agent.zsh zsh/*.zsh zsh/scripts/*.zsh lf/lfcd.sh daily-summary.sh; do
            [ -f "$f" ] || continue
            zsh -n "$f" && echo "OK: $f"
          done
