# \x02 = ctrl+b (tmux prefix)
# \x1b = escape
# \x20 = literal space (used for leading-space leader bindings)

# Shift+Enter → ESC + CR (alternate-return for tmux/nvim)
map shift+enter           send_text all \x1b\r

# --- vim / editor ---
map cmd+s                 send_text all \x1b:w\n
map cmd+z                 send_text all \x1bu
map cmd+shift+z           send_text all \x1b\x12
map cmd+slash             send_text all gcc
map cmd+opt+slash         send_text all gb
map cmd+b                 send_text all gd

# --- leader (space) bindings ---
map cmd+shift+k           send_text all \x20K
map cmd+e                 send_text all \x20e
map cmd+shift+m           send_text all \x20MM
map cmd+shift+p           send_text all \x20T
map cmd+o                 send_text all \x20o
map cmd+shift+o           send_text all \x20lf
map cmd+shift+f           send_text all \x20FF
map cmd+i                 send_text all \x20II
map cmd+shift+i           send_text all \x20ii
map cmd+shift+1           send_text all \x20!@f

# --- tmux window / pane management ---
map cmd+w                 send_text all \x02W
map cmd+shift+n           send_text all \x02S
map cmd+t                 send_text all \x02c
map cmd+shift+t           send_text all \x02%
map cmd+shift+h           send_text all \x02H
map cmd+shift+l           send_text all \x02L
map cmd+d                 send_text all \x02d
map cmd+k                 send_text all \x02K
map cmd+shift+e           send_text all \x02e

# tmux session navigation (shifted symbol keys remapped to physical key)
map cmd+shift+backslash   send_text all \x02w
map cmd+shift+[           send_text all \x02p
map cmd+shift+]           send_text all \x02n

# tmux pane navigation (Cmd+[ / Cmd+])
map cmd+[                 send_text all \x02\x1b[D
map cmd+]                 send_text all \x02\x1b[C
map cmd+opt+shift+[       send_text all \x02\x1b[1;6D
map cmd+opt+shift+]       send_text all \x02\x1b[1;6C

# tmux window reorder / movement
map cmd+period            send_text all \x02.
map cmd+comma             send_text all \x02,
map cmd+opt+comma         send_text all \x02<
map cmd+opt+period        send_text all \x02>

# Alt+Enter / Alt+Shift+Enter — structure motion (> / <)
map opt+enter             send_text all >
map opt+shift+enter       send_text all <

# Cmd+R — runscript alias
map cmd+r                 send_text all _run\n

# --- tmux window numeric switch (Cmd+1..9) ---
map cmd+1                 send_text all \x021
map cmd+2                 send_text all \x022
map cmd+3                 send_text all \x023
map cmd+4                 send_text all \x024
map cmd+5                 send_text all \x025
map cmd+6                 send_text all \x026
map cmd+7                 send_text all \x027
map cmd+8                 send_text all \x028
map cmd+9                 send_text all \x029

# --- Modified F-key CSI sequences ---
# Shift+F1..F12
map shift+f1              send_text all \x1b[1;2P
map shift+f2              send_text all \x1b[1;2Q
map shift+f3              send_text all \x1b[1;2R
map shift+f4              send_text all \x1b[1;2S
map shift+f5              send_text all \x1b[15;2~
map shift+f6              send_text all \x1b[17;2~
map shift+f7              send_text all \x1b[18;2~
map shift+f8              send_text all \x1b[19;2~
map shift+f9              send_text all \x1b[20;2~
map shift+f10             send_text all \x1b[21;2~
map shift+f11             send_text all \x1b[23;2~
map shift+f12             send_text all \x1b[24;2~

# Ctrl+F1..F12
map ctrl+f1               send_text all \x1b[1;5P
map ctrl+f2               send_text all \x1b[1;5Q
map ctrl+f3               send_text all \x1b[1;5R
map ctrl+f4               send_text all \x1b[1;5S
map ctrl+f5               send_text all \x1b[15;5~
map ctrl+f6               send_text all \x1b[17;5~
map ctrl+f7               send_text all \x1b[18;5~
map ctrl+f8               send_text all \x1b[19;5~
map ctrl+f9               send_text all \x1b[20;5~
map ctrl+f10              send_text all \x1b[21;5~
map ctrl+f11              send_text all \x1b[23;5~
map ctrl+f12              send_text all \x1b[24;5~

# Alt(Option)+F1..F12
map opt+f1                send_text all \x1b[1;6P
map opt+f2                send_text all \x1b[1;6Q
map opt+f3                send_text all \x1b[1;6R
map opt+f4                send_text all \x1b[1;6S
map opt+f5                send_text all \x1b[15;6~
map opt+f6                send_text all \x1b[17;6~
map opt+f7                send_text all \x1b[18;6~
map opt+f8                send_text all \x1b[19;6~
map opt+f9                send_text all \x1b[20;6~
map opt+f10               send_text all \x1b[21;6~
map opt+f11               send_text all \x1b[23;6~
map opt+f12               send_text all \x1b[24;6~

# Cmd (Super) + F1..F12
map cmd+f1                send_text all \x1b[1;3P
map cmd+f2                send_text all \x1b[1;3Q
map cmd+f3                send_text all \x1b[1;3R
map cmd+f4                send_text all \x1b[1;3S
map cmd+f5                send_text all \x1b[15;3~
map cmd+f6                send_text all \x1b[17;3~
map cmd+f7                send_text all \x1b[18;3~
map cmd+f8                send_text all \x1b[19;3~
map cmd+f9                send_text all \x1b[20;3~
map cmd+f10               send_text all \x1b[21;3~
map cmd+f11               send_text all \x1b[23;3~
map cmd+f12               send_text all \x20ds
